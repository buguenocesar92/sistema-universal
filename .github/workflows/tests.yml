name: KraftDo Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          API_KEY: ""          # modo dev sin auth
          DB_HOST: ""          # tests no necesitan BD real
          ANTHROPIC_API_KEY: "" # tests usan fallback local
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Check syntax warnings
        run: |
          python3 -c "
          import py_compile, sys, io
          archivos = ['generator.py','core.py','importer.py','classifier.py',
                      'differ.py','normalizer.py','consolidator.py','api.py',
                      'relations.py','formula_parser.py','n8n_generator.py',
                      'kraftdo.py','pipeline.py']
          total_warns = 0
          for f in archivos:
              old = sys.stderr; sys.stderr = buf = io.StringIO()
              py_compile.compile(f, doraise=True)
              sys.stderr = old
              w = buf.getvalue().count('SyntaxWarning')
              total_warns += w
              if w: print(f'WARNING: {f} tiene {w} SyntaxWarnings')
          if total_warns > 0:
              sys.exit(1)
          print(f'OK: 0 SyntaxWarnings en {len(archivos)} archivos')
          "

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check (errores críticos solamente)
        run: |
          ruff check . \
            --select E9,F63,F7,F82 \
            --exclude laravel_output*,laravel_v*,sistema_*,.venv \
            || true  # no bloquear por warnings menores
