name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync files to VPS
        run: |
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '__pycache__/' \
            --exclude '.pytest_cache/' \
            --exclude 'storage/' \
            --exclude '.env' \
            --exclude 'empresas/*.xlsx' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/kraftdo-sistema/

      - name: Rebuild and restart services
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd /opt/kraftdo-sistema
            docker compose up -d --build --no-deps api portal classifier worker laravel
            docker compose exec -T api python3 -c "print('Health check OK')"
          EOF

      - name: Verify health endpoint
        run: |
          sleep 10
          curl -f https://api.kraftdo.cl/health || exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deploy falló - revisar logs en GitHub Actions"
