server {
    listen 80;
    server_name api.kraftdo.cl;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    server_name api.kraftdo.cl;
    ssl_certificate     /etc/letsencrypt/live/api.kraftdo.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.kraftdo.cl/privkey.pem;

    # Deshabilitar listado de directorios
    autoindex off;

    # Bloquear acceso directo a la carpeta de uploads
    location /storage {
        deny all;
        return 403;
    }

    # Bloquear acceso a archivos sensibles
    location ~* \.(env|json|sh|log|sql)$ {
        deny all;
        return 403;
    }

    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Limitar tamaño de upload a 11MB (1MB de margen sobre el límite de la app)
        client_max_body_size 11M;
    }
}
