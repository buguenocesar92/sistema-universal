# ws.kraftdo.cl → Laravel Reverb (WebSockets)
server {
    listen 443 ssl;
    server_name ws.kraftdo.cl;
    ssl_certificate     /etc/letsencrypt/live/ws.kraftdo.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ws.kraftdo.cl/privkey.pem;
    location / {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}
