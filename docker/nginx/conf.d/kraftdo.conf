}
server {
    listen 443 ssl;
    server_name n8n.kraftdo.cl;
    ssl_certificate     /etc/letsencrypt/live/n8n.kraftdo.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.kraftdo.cl/privkey.pem;
