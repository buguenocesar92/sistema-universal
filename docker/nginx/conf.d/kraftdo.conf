# Compresión Gzip — reduce 70% el tráfico
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

# Headers para que Cloudflare CDN funcione correctamente
real_ip_header CF-Connecting-IP;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# kraftdo.cl/admin → Laravel Filament (3 empresas)
server {
    listen 80;
    server_name kraftdo.cl www.kraftdo.cl;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    server_name kraftdo.cl www.kraftdo.cl;
    ssl_certificate     /etc/letsencrypt/live/kraftdo.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kraftdo.cl/privkey.pem;
    autoindex off;
    location /storage { deny all; return 403; }
    location ~* \.(env|json|sh|log|sql|py)$ { deny all; return 403; }
    location / {
        proxy_pass http://laravel:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 11M;
    }
}

